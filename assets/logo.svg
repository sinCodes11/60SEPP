<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0303"/>
      <stop offset="100%" style="stop-color:#1a0808"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>
  <g transform="translate(100,100)">
    <g opacity="0.06">
      <line x1="-60" y1="-60" x2="60" y2="60" stroke="#ff4444" stroke-width="1"/>
      <line x1="-60" y1="60" x2="60" y2="-60" stroke="#ff4444" stroke-width="1"/>
    </g>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="30;40" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.05" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M-30,20 L0,-40 L30,20 Z" fill="none" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
    <circle cx="0" cy="-40" r="3" fill="#ff4444" filter="url(#glow)"/>
    <g transform="translate(0,5)">
      <text x="0" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444" opacity="0.8">#01</text>
      <text x="0" y="25" text-anchor="middle" font-family="monospace" font-size="7" fill="#ff8800" opacity="0.4">PORT SCAN</text>
    </g>
    <g opacity="0.12" fill="none" stroke="#ff4444" stroke-width="0.8">
      <path d="M-18,5 Q-10,0 0,5 Q10,10 18,5"><animate attributeName="d" values="M-18,5 Q-10,0 0,5 Q10,10 18,5;M-18,5 Q-10,10 0,5 Q10,0 18,5;M-18,5 Q-10,0 0,5 Q10,10 18,5" dur="1.5s" repeatCount="indefinite"/></path>
    </g>
  </g>
</svg>
