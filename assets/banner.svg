<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg60" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0d0303"/>
      <stop offset="100%" style="stop-color:#1a0808"/>
    </linearGradient>
    <linearGradient id="accent60" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <linearGradient id="scanline60" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#ff4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glow60"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowStrong60"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip60"><rect width="900" height="200" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#clip60)">
    <rect width="900" height="200" rx="16" fill="url(#bg60)"/>
    <rect width="900" height="200" rx="16" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.3"/>
    <g opacity="0.03">
