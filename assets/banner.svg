      <text x="0" y="30" font-family="monospace" font-size="13" fill="#888" letter-spacing="3">OFFENSIVE SECURITY TOOLKIT</text>
      <text x="0" y="50" font-family="monospace" font-size="11" fill="#666" letter-spacing="1">PENTESTING · CTF · SECURITY RESEARCH</text>
