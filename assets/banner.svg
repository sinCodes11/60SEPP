        <animate attributeName="opacity" values="0.2;0" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(180,65)">
      <text x="0" y="0" font-family="monospace" font-size="42" font-weight="bold" fill="#ff4444" filter="url(#glowStrong60)">
