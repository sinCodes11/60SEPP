    </rect>
    <line x1="0" y1="0" x2="0" y2="200" stroke="#ff4444" stroke-width="1" opacity="0">
      <animate attributeName="x1" values="50;850" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="50;850" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"/>
    </line>
    <g transform="translate(60,100)">
      <g filter="url(#glow60)">
        <path d="M-40,-55 L-40,35 Q-40,55 -20,65 Q0,75 0,55 L0,-55" fill="none" stroke="url(#accent60)" stroke-width="2"/>
        <path d="M0,-55 L0,55 Q20,65 40,55 L40,-55" fill="none" stroke="url(#accent60)" stroke-width="2"/>
        <path d="M-30,-40 L-30,25" stroke="#ff4444" stroke-width="3" opacity="0.6"/>
        <path d="M10,-40 L10,25" stroke="#ff8800" stroke-width="3" opacity="0.6"/>
        <path d="M-10,-20 L20,10" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
        <circle cx="-10" cy="-20" r="4" fill="#ff4444">
